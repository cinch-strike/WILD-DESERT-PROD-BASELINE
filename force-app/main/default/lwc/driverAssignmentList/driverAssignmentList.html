<template>
    <lightning-card  title="">
        <template if:false={tjstatusapproved}>
        <lightning-button label="Add Driver" slot="actions" onclick={selectNewDriver}></lightning-button>   
        </template>   
            <template if:true={isassetAssignment}>
                <table>
                    <thead><tr>
                        <th width="9%">Driver Assignment</th>
                        <th width="10%">Driver Name</th>
                        <th width="10%">Truck</th>
                        <th width="6%">Status</th>
                        <th width="8%">Driver Assignment Date</th>
                        <th width="6%">Assignment Accepted</th>
                        <th width="10%">Start Date/Time</th>
                        <th width="10%">End Date/Time</th>   
                        <th width="5%">Duration (hrs)</th>
                        <th width="11%">Contract Job Item</th> <!-- 02 OCT 2023: C+S - Removed logic related to Type-->
                        <th width="11%">Configuration</th> 
                        <th width="2%"></th> 
                        <th width="2%"></th>                        
                    </tr></thead>
                    <tbody>
                        <template for:each={driverAssignmentList} for:item="driver">
                            <tr  key={driver.Id}>
                                <td><lightning-formatted-rich-text value={driver.Driver_Assignment_URL__c}></lightning-formatted-rich-text></td>  
                                <td>{driver.Driver__r.Name}</td>
                                <td><template lwc:if={driver.Truck__c}>{driver.Truck__r.Name}</template></td>
                                <td style="text-align: center; vertical-align: middle;">{driver.Driver_Status__c}</td>
                                <td style="text-align: center; vertical-align: middle;"><lightning-formatted-date-time value={driver.Driver_Assignment_Date__c}></lightning-formatted-date-time></td>
                                <td style="text-align: center; vertical-align: middle;"><template if:true={driver.Is_Driver_Assignment_Accepted__c}>
                                    <lightning-icon icon-name="utility:success" alternative-text="Accepted" variant="success" title="Accepted" size="small"></lightning-icon>
                                </template></td>
                                <td style="text-align: center; vertical-align: middle;"><lightning-formatted-date-time value={driver.Start_Date_Time__c}></lightning-formatted-date-time> {driver.Start_Time__c}</td> 
                                <td style="text-align: center; vertical-align: middle;"><lightning-formatted-date-time value={driver.End_Date_Time__c}></lightning-formatted-date-time> {driver.End_Time__c}</td>   
                                <td style="text-align: center; vertical-align: middle;">{driver.Duration__c}</td>  
                                <!-- 02 OCT 2023: C+S - Removed logic related to Type-->
                                <td>{driver.Configuration_Name__c}</td>
                                <!--<template if:true={driver.TJ_Type_Regular__c}>
                                    <td>{driver.Configuration_Name__c}</td>
                                </template>
                                <template if:false={driver.TJ_Type_Regular__c}>
                                    <td>{driver.Maintenance_Category__c}</td>
                                </template>-->
                                <!--22 JUN 2023 [C+S] Added the new Configuration field-->
                                <td>{driver.Configuration_pklist__c}</td>
                                <td style="text-align: center; vertical-align: middle;"> <lightning-button-icon icon-name="utility:adduser" alternative-text="View Driver" class="slds-m-left_xx-small" title="View Driver"
                                    data-div={driver.Id} onclick={selectDriver}  size="x-small"></lightning-button-icon></td>
                                <td style="text-align: center; vertical-align: middle;"> <template if:false={tjstatusapproved}><lightning-button-icon icon-name="utility:delete" alternative-text="Delete" class="slds-m-left_xx-small" title="Delete"
                                    data-div={driver.Id} onclick={deleteDriver}  size="x-small"></lightning-button-icon></template></td>                                    
                            </tr>
                        </template>
                    </tbody>
                </table>
            </template>
            <template if:false={isassetAssignment}>
                <b>Please assign a driver.</b>
            </template>
    </lightning-card>
</template>
